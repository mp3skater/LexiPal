<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexipal Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login-register.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/headerFooter.css') }}">
</head>
<body>
{% include 'components/header.html' %}

<div class="glass-container">
    <div class="register-box">
        <h2>Register</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/register" method="POST">
            <!-- Full Name Field -->
            <div class="input-container">
                <input type="text" id="name" name="name" required placeholder=" ">
                <label for="name">Full Name</label>
            </div>

            <!-- Email Field -->
            <div class="input-container">
                <input type="email" id="email" name="email" required placeholder=" ">
                <label for="email">Email</label>
            </div>

            <!-- Password Fields -->
            <div class="input-container">
                <input type="password" id="password" name="password" required placeholder=" " minlength="8">
                <label for="password">Password</label>
            </div>
            <div class="input-container">
                <input type="password" id="confirm-password" name="confirm-password" required placeholder=" " minlength="8">
                <label for="confirm-password">Confirm Password</label>
            </div>

            <!-- API Key Fields -->
            <div class="input-container">
                <input type="text" id="google-api-key" name="google_api_key" placeholder=" ">
                <label for="google-api-key">Google API Key (optional)</label>
            </div>
            <div class="input-container">
                <input type="text" id="google-pro-api-key" name="google_pro_api_key" placeholder=" ">
                <label for="google-pro-api-key">Google Pro API Key (optional)</label>
            </div>

            <button type="submit">Register</button>
            <p>Already have an account? <a href="/login" id="login">Login</a></p>
        </form>
    </div>
</div>
</body>
</html>
