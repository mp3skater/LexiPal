<header id="main-header">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" width="50" alt="LexiPal Logo">
        <span style="color: #0a700a">LexiPal</span>
    </div>

    <nav class="navbar">
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/features">Features</a></li>
            <li><a href="/languages">Languages</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <div class="right-section">
        {% if current_user.is_authenticated %}
            <div class="user-menu">
                <button class="icon-button"><i class="fas fa-user"></i></button>
                <div class="dropdown-content">
                    <a href="/profile">Profile</a>
                    <a href="/settings">Settings</a>
                    <a href="/logout">Logout</a>
                </div>
            </div>
        {% else %}
            <div class="settings">
                <button class="icon-button"><i class="fas fa-cog"></i></button>
                <button class="icon-button"><i class="fas fa-question-circle"></i></button>
            </div>
            <button class="login-button" onclick="window.location.href = '/login';">Login</button>
        {% endif %}
    </div>
</header>
